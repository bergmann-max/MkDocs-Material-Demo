[project]
site_name = "Zensical Demo"
site_url = "https://bergmann-max.github.io/Zensical-Demo/"
site_dir = "public"

extra_javascript = [
    "javascripts/tablesort.min.js",
    "javascripts/tablesort.js",
    "javascripts/katex.js",
    "https://unpkg.com/katex@0.17.0/dist/katex.min.js",
    "https://unpkg.com/katex@0.17.0/dist/contrib/auto-render.min.js",
]

extra_css = [
    "https://unpkg.com/katex@0.17.0/dist/katex.min.css",
]

[project.theme]
variant = "modern"
custom_dir = "overrides"
language = "en"
logo = "assets/logo.png"
favicon = "assets/favicon.ico"
features = [
    "content.action.edit",
    "content.code.annotate",
    "content.code.copy",
    "content.tooltips",
    "search.suggest",
    "search.highlight",
    "header.autohide",
    "announce.dismiss",
    "navigation.instant",
    "navigation.instant.progress",
    "navigation.tracking",
    "navigation.path",
    "navigation.tabs",
    "navigation.tabs.sticky",
    "navigation.top",
    "navigation.indexes",
    "navigation.sections",
    "toc.integrate",
    "toc.follow",
]

[project.theme.font]
code = "Fira Mono"

[project.theme.icon]
repo = "fontawesome/brands/github"
edit = "material/pencil"

[project.theme.icon.admonition]
note = "fontawesome/solid/note-sticky"
abstract = "fontawesome/solid/book"
info = "fontawesome/solid/circle-info"
tip = "fontawesome/solid/bullhorn"
success = "fontawesome/solid/check"
question = "fontawesome/solid/circle-question"
warning = "fontawesome/solid/triangle-exclamation"
failure = "fontawesome/solid/bomb"
danger = "fontawesome/solid/skull"
bug = "fontawesome/solid/robot"
example = "fontawesome/solid/flask"
quote = "fontawesome/solid/quote-left"

[project.theme.icon.tag]
formatting = "material/format-text"
content = "material/card-text"
media = "material/image"
code = "material/code-tags"

[[project.theme.palette]]
scheme = "default"
media = "(prefers-color-scheme: light)"
toggle.icon = "material/brightness-7"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
scheme = "slate"
media = "(prefers-color-scheme: dark)"
toggle.icon = "material/brightness-4"
toggle.name = "Switch to light mode"

[project.markdown_extensions.pymdownx.snippets]
auto_append = ["includes/abbreviations.md"]

[project.markdown_extensions.pymdownx.superfences]
custom_fences = [
    { name = "mermaid", class = "mermaid", format = "pymdownx.superfences.fence_code_format" },
]

[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
line_spans = "__span"
pygments_lang_class = true

[project.markdown_extensions.pymdownx.inlinehilite]

[project.markdown_extensions.admonition]

[project.markdown_extensions.pymdownx.details]

[project.markdown_extensions.tables]

[project.markdown_extensions.attr_list]

[project.markdown_extensions.md_in_html]

[project.markdown_extensions.toc]
permalink = true

[project.markdown_extensions.pymdownx.emoji]
emoji_index = "zensical.extensions.emoji.twemoji"
emoji_generator = "zensical.extensions.emoji.to_svg"

[project.markdown_extensions.def_list]

[project.markdown_extensions.pymdownx.tasklist]
custom_checkbox = true

[project.markdown_extensions.abbr]

[project.markdown_extensions.footnotes]

[project.markdown_extensions.pymdownx.critic]

[project.markdown_extensions.pymdownx.caret]

[project.markdown_extensions.pymdownx.keys]

[project.markdown_extensions.pymdownx.mark]

[project.markdown_extensions.pymdownx.tilde]

[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true

[project.markdown_extensions.pymdownx.arithmatex]
generic = true

[project.markdown_extensions.zensical.extensions.glightbox]
width = "100%"
height = "auto"
skip_classes = ["custom-skip-class-name"]
auto_caption = true
caption_position = "bottom"

[project.extra.tags]
Formatting = "formatting"
Content = "content"
Media = "media"
Code = "code"

[project.extra.version]
provider = "mike"
default = "stable"
